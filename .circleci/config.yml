version: 2.1

orbs:
  snyk: snyk/snyk@2.3.0
  node: circleci/node@7.2.1
  docker: circleci/docker@4.0.1

commands:
  notify_on_fail:
    steps:
      - run:
          name: Notify on failure
          when: on_fail
          command: |
            curl -H "Content-Type: application/json" -X POST -d "{\"content\": \"<@&1522971188668928080> ❌ **${CIRCLE_PROJECT_REPONAME} #${CIRCLE_BUILD_NUM}** failed in job **${CIRCLE_JOB}** on branch **${CIRCLE_BRANCH}**!\\nDetails: ${CIRCLE_BUILD_URL}\"}" "$DISCORD_WEBHOOK"
  get_deployment_colours:
    steps:
      - run:
          name: Get Deployment Colour Variables
          command: |
            colour=$(ssh -o StrictHostKeyChecking=no ubuntu@${DEPLOYMENT_HOST} 'cat secret-notes/backend-prod.colour' | tr -d '\n')
            if [ "$colour" = "green" ]; then
                echo 'export PRODUCTION_COLOUR="green"' >> $BASH_ENV
                echo 'export STAGING_COLOUR="blue"' >> $BASH_ENV
            else
                echo 'export PRODUCTION_COLOUR="blue"' >> $BASH_ENV
                echo 'export STAGING_COLOUR="green"' >> $BASH_ENV
            fi

jobs:
  snyk:
    docker:
      - image: cimg/node:22.11
    steps:
      - checkout
      - node/install-packages
      - snyk/scan
      - notify_on_fail

  sonar:
    docker:
      - image: sonarsource/sonar-scanner-cli:latest
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: SonarQube scan
          command: sonar-scanner
      - notify_on_fail

  prepare-deployment:
    docker:
      - image: cimg/base:stable
    steps:
      - add_ssh_keys:
          fingerprints:
            - SHA256:gg5cFYIlLTQ/DhKaMqSqyK2LqUv0lCo5oBlLhjSBW/4
      - get_deployment_colours
      - run:
          name: Plan deployment
          command: |
            circleci run release plan \
              --environment-name=aws \
              --component-name=backend \
              --target-version="1.0.${CIRCLE_BUILD_NUM}-${CIRCLE_SHA1:0:7}"
      - run:
          name: Prepare new docker image
          command: |
            ssh -o StrictHostKeyChecking=no ubuntu@$DEPLOYMENT_HOST "
              docker pull $DOCKER_LOGIN/nocryptify_backend
              docker rm -f "backend-$STAGING_COLOUR" >/dev/null 2>&1 || true
            "
      - run:
          name: Run database migrations
          command: |
            # ssh -o StrictHostKeyChecking=no ubuntu@$DEPLOYMENT_HOST "
            #   docker run --rm \
            #   --network network \
            #   --env-file ./secret-notes/.env \
            #   $DOCKER_LOGIN/nocryptify_backend \
            #   npm run migrate
            # "
            echo "TODO for later"
      - run:
          name: Change Deployment Status to cancelled
          command: circleci run release update --status=CANCELED
          when: on_fail

  deploy-staging:
    docker:
      - image: cimg/base:stable
    steps:
      - add_ssh_keys:
          fingerprints:
            - SHA256:gg5cFYIlLTQ/DhKaMqSqyK2LqUv0lCo5oBlLhjSBW/4
      - get_deployment_colours
      - run: circleci run release update --status=running
      - run:
          name: Start new Container
          command: |
            ssh -o StrictHostKeyChecking=no ubuntu@$DEPLOYMENT_HOST "
              docker run -d \
              --name \"backend-$STAGING_COLOUR\" \
              --network network \
              --env-file ./secret-notes/.env \
              --restart unless-stopped \
              $DOCKER_LOGIN/nocryptify_backend
              echo \"Waiting for health check\"
              for _ in {1..30}; do
                status=\$(docker inspect -f '{{.State.Health.Status}}' \"backend-$STAGING_COLOUR\" 2>/dev/null || echo none)
                [ \"\$status\" = \"healthy\" ] && break
                sleep 2
              done
              if [ \$(docker inspect -f '{{.State.Health.Status}}' \"backend-$STAGING_COLOUR\") != \"healthy\" ]; then
                echo \"Health check failed\" >&2
                docker logs \"backend-$STAGING_COLOUR\"
                docker rm -f \"backend-$STAGING_COLOUR\"
                exit 1
              fi
            "
      - run:
          name: Change Deployment Status to fail
          command: circleci run release update --status=FAILED --failure-reason="Container failed to start"
          when: on_fail
      - notify_on_fail

  smoke-tests:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Performance Tests against staging
          command: |
            echo "Run Tests"
      - run:
          name: Change Deployment Status to fail
          command: circleci run release update --status=FAILED --failure-reason="Performance Tests failed"
          when: on_fail
      - notify_on_fail

  deploy-production:
    docker:
      - image: cimg/base:stable
    steps:
      - get_deployment_colours
      - run:
          name: Switch blue/green
          command: |
            ssh -o StrictHostKeyChecking=no ubuntu@$DEPLOYMENT_HOST "
              if [ \"$STAGING_COLOUR\" = \"green\" ]; then
                  echo -e 'set \$backend_production http://backend-green:3000;\nset \$backend_staging http://backend-blue:3000;\n' > ./secret-notes/nginx/targets/backend.conf
                  echo 'green' > ./secret-notes/backend-prod.colour
              else
                  echo -e 'set \$backend_production http://backend-blue:3000;\nset \$backend_staging http://backend-green:3000;\n' > ./secret-notes/nginx/targets/backend.conf
                  echo 'blue' > ./secret-notes/backend-prod.colour
              fi
              docker exec proxy nginx -s reload
            "
      - run:
          name: Change Deployment Status to fail
          command: circleci run release update --status=FAILED --failure-reason="Switching Deployments failed"
          when: on_fail
      - notify_on_fail

  notify:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Notify on success
          command: |
            curl -H "Content-Type: application/json" -X POST -d "{\"content\": \"✅ **${CIRCLE_PROJECT_REPONAME} #${CIRCLE_BUILD_NUM}** on branch **${CIRCLE_BRANCH}** finished successfully!\\nDetails: ${CIRCLE_BUILD_URL}\"}" "$DISCORD_WEBHOOK"
      - run:
          name: Change Deployment Status to success
          command: circleci run release update --status=SUCCESS


workflows:

  default:
    when:
      equal: [main, << pipeline.git.branch >>]
    jobs: 
      - snyk
      - sonar
      - node/test:
          test-results-for: jest
          test-coverage-path: coverage
          post-steps:
            - notify_on_fail
      - docker/publish:
          deploy: false
          image: $DOCKER_LOGIN/nocryptify_backend
          post-steps:
            - notify_on_fail
      - notify:
          requires:
            - snyk
            - sonar
            - node/test
            - docker/publish

  deploy:
    when:
      equal: ["deploy/production", << pipeline.git.branch >>]
    jobs:
      - snyk
      - sonar
      - node/test:
          test-results-for: jest
          test-coverage-path: coverage
          post-steps:
            - notify_on_fail
      - docker/publish:
          image: $DOCKER_LOGIN/nocryptify_backend
          tag: $CIRCLE_SHA1,latest
          post-steps:
            - notify_on_fail
          requires:
            - snyk
            - sonar
            - node/test
      - prepare-deployment:
          requires:
            - docker/publish
      - deploy-staging:
          requires:
            - prepare-deployment
      - smoke-tests:
          requires:
            - deploy-staging
      - deploy-production:
          requires:
            - smoke-tests
      - notify:
          requires:
            - deploy-production
