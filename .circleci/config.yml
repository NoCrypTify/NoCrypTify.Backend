version: 2.1

orbs:
  snyk: snyk/snyk@2.3.0
  node: circleci/node@7.2.1
  docker: circleci/docker@4.0.1

commands:
  notify_on_fail:
    steps:
      - run:
          name: Notify on failure
          when: on_fail
          command: |
            curl -H "Content-Type: application/json" -X POST -d "{\"content\": \"<@&1522971188668928080> ❌ **${CIRCLE_PROJECT_REPONAME} #${CIRCLE_BUILD_NUM}** failed in job **${CIRCLE_JOB}** on branch **${CIRCLE_BRANCH}**!\\nDetails: ${CIRCLE_BUILD_URL}\"}" "$DISCORD_WEBHOOK"

jobs:
  snyk:
    docker:
      - image: cimg/node:22.11
    steps:
      - checkout
      - node/install-packages
      - snyk/scan
      - notify_on_fail

  sonar:
    docker:
      - image: sonarsource/sonar-scanner-cli:latest
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: SonarQube scan
          command: sonar-scanner
          environment:
            SONAR_HOST_URL: "$SONAR_HOST_URL"
            SONAR_TOKEN: "$SONAR_TOKEN"
      - notify_on_fail

  deploy:
    executor: node
    steps:
      - checkout
      - run:
          name: Deploy to staging (Blue/Green)
          command: echo "TODO 8 provision AWS EC2 staging + RDS + blue/green swap script."
      - notify_on_fail

  e2e:
    executor: node
    steps:
      - checkout
      - run:
          name: E2E + performance against staging
          command: |
            echo "TODO: run Playwright + k6 against the staging environment."
            echo "On success, trigger the Blue/Green traffic switch from the Deploy stage."
      - notify_on_fail

workflows:

  default:
    when:
      equal: [main, << pipeline.git.branch >>]
    jobs: 
      - snyk
      - sonar
      - node/test:
          test-results-for: jest
          post-steps:
            - notify_on_fail
      - docker/publish:
          deploy: false
          image: $DOCKER_LOGIN/nocryptify_backend
          post-steps:
            - notify_on_fail

  deploy:
    when:
      equal: ["deploy/production", << pipeline.git.branch >>]
    jobs:
      - snyk
      - sonar
      - node/test:
          test-results-for: jest
          post-steps:
            - notify_on_fail
      - docker/publish:
          image: $DOCKER_LOGIN/nocryptify_backend
          post-steps:
            - notify_on_fail
          requires:
            - snyk
            - sonar
            - node/test
      - deploy:
          requires:
            - deliver
      - e2e:
          requires:
            - deploy

