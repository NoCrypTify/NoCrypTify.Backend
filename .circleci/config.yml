version: 2.1

orbs:
  snyk: snyk/snyk@2.3.0
  node: circleci/node@7.2.1
  docker: circleci/docker@4.0.1

commands:
  notify_on_fail:
    steps:
      - run:
          name: Notify on failure
          when: on_fail
          command: |
            curl -H "Content-Type: application/json" -X POST -d "{\"content\": \"<@&1522971188668928080> ❌ **${CIRCLE_PROJECT_REPONAME} #${CIRCLE_BUILD_NUM}** failed in job **${CIRCLE_JOB}** on branch **${CIRCLE_BRANCH}**!\\nDetails: ${CIRCLE_BUILD_URL}\"}" "$DISCORD_WEBHOOK"

jobs:
  snyk:
    docker:
      - image: cimg/node:22.11
    steps:
      - checkout
      - node/install-packages
      - snyk/scan
      - notify_on_fail

  sonar:
    docker:
      - image: sonarsource/sonar-scanner-cli:latest
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: SonarQube scan
          command: sonar-scanner
      - notify_on_fail

  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - add_ssh_keys:
          fingerprints:
            - SHA256:gg5cFYIlLTQ/DhKaMqSqyK2LqUv0lCo5oBlLhjSBW/4
      - run:
          name: Pull docker image
          command: docker pull if25b048/nocryptify_backend:staging
      # Replace inactive deployment TODO
      - notify_on_fail

  e2e:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: E2E + performance against staging
          command: |
            echo "TODO: run Playwright + k6 against the staging environment."
            echo "On success, trigger the Blue/Green traffic switch from the Deploy stage."
      - notify_on_fail

workflows:

  default:
    when:
      equal: [main, << pipeline.git.branch >>]
    jobs: 
      - snyk
      - sonar
      - node/test:
          test-results-for: jest
          post-steps:
            - notify_on_fail
      - docker/publish:
          deploy: false
          image: $DOCKER_LOGIN/nocryptify_backend
          post-steps:
            - notify_on_fail

  deploy:
    when:
      equal: ["deploy/production", << pipeline.git.branch >>]
    jobs:
      - snyk
      - sonar
      - node/test:
          test-results-for: jest
          post-steps:
            - notify_on_fail
      - docker/publish:
          image: $DOCKER_LOGIN/nocryptify_backend
          tag: $CIRCLE_SHA1,staging
          post-steps:
            - notify_on_fail
          requires:
            - snyk
            - sonar
            - node/test
      - deploy:
          requires:
            - docker/publish
      - e2e:
          requires:
            - deploy
