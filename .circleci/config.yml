version: 2.1

orbs:
  snyk: snyk/snyk@2.3.0
  node: circleci/node@7.2.1
  docker: circleci/docker@4.0.1

jobs:
  snyk:
    docker:
      - image: cimg/node:22.11
    steps:
      - checkout
      - node/install-packages
      - snyk/scan

  sonar:
    docker:
      - image: sonarsource/sonar-scanner-cli:latest
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: SonarQube scan
          command: sonar-scanner
          environment:
            SONAR_HOST_URL: ${SONAR_HOST_URL}
            SONAR_TOKEN: ${SONAR_TOKEN}
            SONAR_SCANNER_OPTS: "-Dsonar.projectKey=secret-notes-backend"

  deploy:
    executor: node
    steps:
      - checkout
      - run:
          name: Deploy to staging (Blue/Green)
          command: echo "TODO 8 provision AWS EC2 staging + RDS + blue/green swap script."
      - notify_on_fail

  e2e:
    executor: node
    steps:
      - checkout
      - run:
          name: E2E + performance against staging
          command: |
            echo "TODO: run Playwright + k6 against the staging environment."
            echo "On success, trigger the Blue/Green traffic switch from the Deploy stage."
      - notify_on_fail

workflows:

  default:
    when:
      equal: [main, << pipeline.git.branch >>]
    jobs: 
      - snyk
      - sonar
      - node/test
      - docker/publish:
          deploy: false
          image: $DOCKER_LOGIN/nocryptify_backend

  deploy:
    when:
      equal: ["deploy/production", << pipeline.git.branch >>]
    jobs:
      - snyk
      - sonar
      - node/test
      - docker/publish:
          image: $DOCKER_LOGIN/$nocryptify_backend
          requires:
            - snyk
            - sonar
            - node/test
      - deploy:
          requires:
            - deliver
      - e2e:
          requires:
            - deploy

